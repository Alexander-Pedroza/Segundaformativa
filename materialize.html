<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Materialize - Comparativa</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" rel="stylesheet">
</head>
<body>
  <nav>
    <div class="nav-wrapper">
      <a href="#" class="brand-logo" style="padding-left:10px">Logo</a>
      <ul id="nav-mobile" class="right hide-on-med-and-down">
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Productos</a></li>
      </ul>
    </div>
  </nav>

  <div class="container" style="margin-top:20px">
    <div class="row">
      <div class="col s12 m4">
        <div class="card">
          <div class="card-image">
            <img src="logoramdom.jpg">
          </div>
          <div class="card-content">
            <span class="card-title">Producto Materialize</span>
            <p>Descripción corta del producto para la comparativa visual entre frameworks.</p>
          </div>
          <div class="card-action">
            <a class="btn">Comprar</a>
          </div>
        </div>
      </div>

      <div class="col s12 m8">
        <h4>Demostración Materialize</h4>
        <p>Materialize implementa Material Design con animaciones y ripple en botones (requiere JS).</p>

        <form onsubmit="event.preventDefault(); M.toast({html: 'Enviado (simulado)'});">
          <div class="row">
            <div class="input-field col s12 m6">
              <input id="name" type="text" class="validate">
              <label for="name">Nombre</label>
            </div>
            <div class="input-field col s12 m6">
              <input id="email" type="email" class="validate">
              <label for="email">Email</label>
            </div>
          </div>
          <button class="btn" type="submit">Enviar</button>
        </form>

      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script>document.addEventListener('DOMContentLoaded', function(){ M.AutoInit(); });</script>
</body>
</html>
