<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tailwind CSS - Comparativa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <!-- Navbar -->
  <header class="bg-white shadow">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center">
          <div class="text-xl font-bold text-blue-600">Logo</div>
        </div>
        <nav class="hidden md:flex space-x-4">
          <a href="#" class="text-gray-700 hover:text-blue-600">Inicio</a>
          <a href="#" class="text-gray-700 hover:text-blue-600">Productos</a>
        </nav>
        <div class="md:hidden">
          <button class="text-gray-700">Menu</button>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-4">
    <section class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-6">
      <!-- Card -->
      <article class="bg-white rounded-lg shadow p-4 md:col-span-1">
        <img src="logoramdom.jpg" alt="Producto" class="w-full h-48 object-cover rounded">
        <h2 class="mt-4 text-lg font-semibold">Producto Tailwind</h2>
        <p class="mt-2 text-gray-600">Descripción corta del producto para la comparativa visual entre frameworks.</p>
        <button class="mt-4 inline-block bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">Comprar</button>
      </article>

      <!-- Spacer / Info -->
      <div class="md:col-span-2 bg-white rounded-lg shadow p-6">
        <h3 class="text-xl font-semibold mb-2">Demostración Tailwind</h3>
        <p class="text-gray-600">Este contenedor contextualiza la card y el formulario. Tailwind usa utilidades para aplicar estilos (flex, grid, bg-*, rounded, shadow, etc.).</p>

        <!-- Contact Form -->
        <form class="mt-6 space-y-4" onsubmit="event.preventDefault(); alert('Enviado (simulado)');">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-gray-700">Nombre</label>
              <input type="text" class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="Tu nombre">
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700">Email</label>
              <input type="email" class="mt-1 block w-full rounded border-gray-300 shadow-sm focus:ring-blue-500 focus:border-blue-500" placeholder="tu@ejemplo.com">
            </div>
          </div>
          <div>
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white py-2 px-4 rounded">Enviar</button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
