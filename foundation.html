<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Foundation - Comparativa</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/foundation-sites@6.7.5/dist/css/foundation.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/foundation-sites@6.7.5/dist/js/foundation.min.js"></script>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <ul class="menu">
        <li class="menu-text"><strong class="text-primary">Logo</strong></li>
      </ul>
    </div>
    <div class="top-bar-right">
      <ul class="menu">
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Productos</a></li>
      </ul>
    </div>
  </div>

  <div class="grid-container">
    <div class="grid-x grid-margin-x">
      <div class="cell small-12 medium-4">
        <div class="card">
          <img src="logoramdom.jpg" alt="Producto">
          <div class="card-section">
            <h4>Producto Foundation</h4>
            <p>Descripción corta del producto para la comparativa visual entre frameworks.</p>
            <a class="button primary">Comprar</a>
          </div>
        </div>
      </div>
      <div class="cell small-12 medium-8">
        <h4>Demostración Foundation</h4>
        <p>Foundation utiliza un sistema de grid flexible con clases como grid-x y cell.</p>

        <form onsubmit="event.preventDefault(); alert('Enviado (simulado)')">
          <div class="grid-x grid-padding-x">
            <div class="medium-6 cell">
              <label>Nombre
                <input type="text" placeholder="Tu nombre">
              </label>
            </div>
            <div class="medium-6 cell">
              <label>Email
                <input type="email" placeholder="tu@ejemplo.com">
              </label>
            </div>
          </div>
          <button class="button primary" type="submit">Enviar</button>
        </form>

      </div>
    </div>
  </div>

  <script>$(document).foundation();</script>
</body>
</html>
