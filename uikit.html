<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>UIkit - Comparativa</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.16.22/dist/css/uikit.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/uikit@3.16.22/dist/js/uikit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/uikit@3.16.22/dist/js/uikit-icons.min.js"></script>
</head>
<body>
  <nav class="uk-navbar-container" uk-navbar>
    <div class="uk-navbar-left">
      <a class="uk-navbar-item uk-logo" href="#">Logo</a>
    </div>
    <div class="uk-navbar-right">
      <ul class="uk-navbar-nav">
        <li><a href="#">Inicio</a></li>
        <li><a href="#">Productos</a></li>
      </ul>
    </div>
  </nav>

  <div class="uk-container uk-margin-top">
    <div class="uk-grid-medium uk-child-width-1-3@m" uk-grid>
      <div>
        <div class="uk-card uk-card-default uk-card-body">
          <div class="uk-card-media-top">
            <img src="logoramdom.jpg" alt="Producto">
          </div>
          <h3 class="uk-card-title">Producto UIkit</h3>
          <p>Descripción corta del producto para la comparativa visual entre frameworks.</p>
          <button class="uk-button uk-button-primary">Comprar</button>
        </div>
      </div>

      <div class="uk-width-expand">
        <h3>Demostración UIkit</h3>
        <p>UIkit ofrece componentes y utilidades con estilos por defecto modernos.</p>

        <form class="uk-form-stacked" onsubmit="event.preventDefault(); alert('Enviado (simulado)')">
          <div class="uk-margin">
            <label class="uk-form-label">Nombre</label>
            <div class="uk-form-controls">
              <input class="uk-input" type="text" placeholder="Tu nombre">
            </div>
          </div>
          <div class="uk-margin">
            <label class="uk-form-label">Email</label>
            <div class="uk-form-controls">
              <input class="uk-input" type="email" placeholder="tu@ejemplo.com">
            </div>
          </div>
          <div class="uk-margin">
            <button class="uk-button uk-button-primary">Enviar</button>
          </div>
        </form>

      </div>
    </div>
  </div>
</body>
</html>
